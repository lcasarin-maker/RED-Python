consolidation_strategy:
  # How we avoid duplication in integrated structure

  1_authority_per_concept:
    description: Each concept has ONE authoritative entry
    example: "Mocks are owned by VT (testing); VC entries reference VT-023"
    benefit: "Avoid copy-paste drift, single source updates"

  cross_domain_links:
    description: Link entries that illuminate each other
    example: "VC-118 (zombie compat) ← TK-008 (epistemology) ← VT-083 (expected broken)"
    benefit: "Full picture without redundancy"

  category_reorganization:
    description: Reorganize deprecated categories by ROOT CAUSE not symptom
    deprecated_structure: "By type (Coding, Testing, Tokenomics)"
    new_structure: "By failure domain (Epistemology, State, Architecture, Governance)"
    benefit: "Natural deduplication; root causes cluster together"

integration_phases:
  phase_1_consolidate:

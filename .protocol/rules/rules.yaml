# Coder Cerberus Declarative Rules Matrix (ast-grep style)
# v0.02 | Agnóstico de Lenguaje

rules:
  - id: D6_prevent_var_declaration
    domain: D6
    pattern: "ast.Name"
    keywords: ["var "]
    extensions: [".js", ".html"]
    message: "La palabra clave obsoleta 'var' está prohibida. Usa 'let' o 'const' para higiene y tipado fuerte."
    golden_standard_ref: VC-067

  - id: D7_prevent_unsafe_eval
    domain: D7
    func: "eval"
    message: "El uso de 'eval()' está prohibido por seguridad de inyección estática (D7)."
    golden_standard_ref: VC-115

  - id: D7_prevent_insecure_defaults
    domain: D7
    keywords: ["verify=False", "host='0.0.0.0'", 'host="0.0.0.0"', "CORS origins='*'", 'CORS origins="*"', "origins='*'", 'origins="*"', "hashlib.md5(", "debug=True"]
    message: "Se detectó un valor predeterminado inseguro por defecto (verify=False, debug=True, host='0.0.0.0', CORS origins='*' o similar) prohibido por VC-138."
    golden_standard_ref: VC-138


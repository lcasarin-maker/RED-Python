repos:
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.4.1
    hooks:
      - id: ruff
        args: [--fix]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [types-requests]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: run-compliance-tests-check
        name: Run Compliance Tests – version parity check
        entry: python scripts/run_compliance_tests.py
        language: system
        always_run: true
        stages: [commit]
        pass_filenames: false
      - id: tk-044-enforce-thinking-limits
        name: "TK-044: Enforce thinking limits"
        entry: python scripts/enforce_thinking_limits.py
        language: system
        always_run: true
        stages: [commit]
        pass_filenames: false
      - id: tk-045-model-router
        name: "TK-045: Model routing decision"
        entry: python scripts/model_router.py
        language: system
        always_run: true
        stages: [commit]
        pass_filenames: false
      - id: tk-047-tool-result-cleaner
        name: "TK-047: Clean tool results"
        entry: python scripts/tool_result_cleaner.py
        language: system
        always_run: true
        stages: [commit]
        pass_filenames: false
      - id: tk-049-block-auto-docs
        name: "TK-049: Block auto-generated docs"
        entry: python scripts/block_auto_docs.py
        language: system
        always_run: true
        stages: [commit]
        pass_filenames: false
      - id: tk-050-image-cost-detector
        name: "TK-050: Detect image costs"
        entry: python scripts/image_cost_detector.py
        language: system
        always_run: true
        stages: [commit]
        pass_filenames: false
      - id: audit-hygiene
        name: "Hygiene: repo structure audit"
        entry: python scripts/audit_hygiene.py
        language: system
        always_run: true
        stages: [commit]
        pass_filenames: false
      - id: validate-state-checkpoint
        name: "Validate: state checkpoint SHA256"
        entry: python scripts/validate_state_checkpoint.py
        language: system
        always_run: true
        stages: [commit]
        pass_filenames: false
      - id: validate-security-tier
        name: "Validate: security boundaries (Regla 24)"
        entry: python scripts/validate_security_tier.py
        language: system
        always_run: true
        stages: [commit]
        pass_filenames: false
      - id: validate-routing
        name: "Validate: multi-agent routing (Regla 28)"
        entry: python scripts/validate_routing.py
        language: system
        always_run: true
        stages: [commit]
        pass_filenames: false
